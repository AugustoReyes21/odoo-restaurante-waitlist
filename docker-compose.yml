name: odoo-restaurante-waitlist

services:
  web:
    image: odoo:19.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD_FILE: /run/secrets/postgresql_password
    secrets:
      - postgresql_password
    command:
      - odoo
      - --config=/etc/odoo/odoo.conf
      - --db_host=db
      - --db_port=5432
      - --db_user=odoo
      - --database=odoo_restaurante
      - --db-filter=^odoo_restaurante$
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD_FILE: /run/secrets/postgresql_password
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    secrets:
      - postgresql_password
    restart: unless-stopped

  odoo-init:
    image: odoo:19.0
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD_FILE: /run/secrets/postgresql_password
    secrets:
      - postgresql_password
    command:
      - bash
      - -lc
      - |
        DB_PASSWORD="$$(cat /run/secrets/postgresql_password)"
        odoo \
          --config=/etc/odoo/odoo.conf \
          --db_host=db \
          --db_port=5432 \
          --db_user=odoo \
          --db_password="$$DB_PASSWORD" \
          --database=odoo_restaurante \
          --init=base,contacts,point_of_sale,pos_restaurant,restaurant_waitlist \
          --stop-after-init
        odoo shell \
          --config=/etc/odoo/odoo.conf \
          --db_host=db \
          --db_port=5432 \
          --db_user=odoo \
          --db_password="$$DB_PASSWORD" \
          -d odoo_restaurante <<'PY'
        from odoo.addons.restaurant_waitlist.hooks import ensure_restaurant_setup
        result = ensure_restaurant_setup(env)
        env.cr.commit()
        print("Restaurant setup ready:", result)
        PY
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons

volumes:
  odoo-web-data:
  odoo-db-data:

secrets:
  postgresql_password:
    file: odoo_pg_pass
